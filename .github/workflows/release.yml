name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    if: github.ref_type != 'tag'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Dalamud dev files
        shell: pwsh
        run: |
          $hooks = Join-Path $env:APPDATA "XIVLauncher/addon/Hooks/dev"
          New-Item -ItemType Directory -Force -Path $hooks | Out-Null
          Invoke-WebRequest -UseBasicParsing "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile "$env:RUNNER_TEMP/dalamud.zip"
          Expand-Archive "$env:RUNNER_TEMP/dalamud.zip" -DestinationPath $hooks -Force

      - name: Restore
        run: dotnet restore Huntsman.slnx

      - name: Build
        run: dotnet build Huntsman/Huntsman.csproj --configuration Release --no-restore

  release:
    if: github.ref_type == 'tag'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Dalamud dev files
        shell: pwsh
        run: |
          $hooks = Join-Path $env:APPDATA "XIVLauncher/addon/Hooks/dev"
          New-Item -ItemType Directory -Force -Path $hooks | Out-Null
          Invoke-WebRequest -UseBasicParsing "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile "$env:RUNNER_TEMP/dalamud.zip"
          Expand-Archive "$env:RUNNER_TEMP/dalamud.zip" -DestinationPath $hooks -Force

      - name: Validate tag matches project version
        shell: pwsh
        run: |
          [xml]$project = Get-Content Huntsman/Huntsman.csproj
          $version = $project.Project.PropertyGroup.Version
          $expected = "v$version"
          if ("${{ github.ref_name }}" -ne $expected) {
            throw "Tag ${{ github.ref_name }} does not match project version $expected"
          }

      - name: Restore
        run: dotnet restore Huntsman.slnx

      - name: Build plugin package
        run: dotnet build Huntsman/Huntsman.csproj --configuration Release --no-restore

      - name: Locate Dalamud package
        id: package
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path Huntsman/bin/Release -Recurse -Filter latest.zip |
            Where-Object { $_.FullName -match '[\\/]Huntsman[\\/]latest\.zip$' } |
            Select-Object -First 1
          if (-not $zip) {
            throw "DalamudPackager did not produce latest.zip"
          }
          $asset = Join-Path $env:RUNNER_TEMP "Huntsman-latest.zip"
          Copy-Item $zip.FullName $asset -Force
          "zip=$asset" >> $env:GITHUB_OUTPUT

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
          name: Huntsman ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          overwrite_files: true
          make_latest: true

      - name: Dispatch pluginmaster update
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $payload = @{
            event_type = "update-pluginmaster"
            client_payload = @{
              repository = "${{ github.repository }}"
              tag = "${{ github.ref_name }}"
            }
          } | ConvertTo-Json -Compress

          $payload | gh api repos/Ankhito/AnkhitoPlugins/dispatches --method POST --input -
